name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build & Test
        working-directory: java-assignment
        run: ./mvnw -B -ntp clean verify

      - name: Package
        working-directory: java-assignment
        run: ./mvnw -B -ntp package -DskipTests
